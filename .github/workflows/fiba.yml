name: Fibonacci Workflow

on:
  workflow_dispatch:   # manual trigger

jobs:
  fibonacci:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Fibonacci Series
        run: |
          n=10
          a=0
          b=1
          echo "Fibonacci Series:"
          for (( i=0; i<n; i++ ))
          do
            echo -n "$a "
            fn=$((a + b))
            a=$b
            b=$fn
          done
